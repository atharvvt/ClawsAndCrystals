{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<section class="page-section px-6">
    <div class="max-w-md mx-auto glass-card p-8 md:p-10">
        <div class="section-header mb-8">
            <span class="section-eyebrow">Account</span>
            <h1 class="section-title">Forgot Password</h1>
        </div>

        <p class="text-muted text-sm mb-6">
            Enter your account email and we'll send you a link to reset your password.
        </p>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div class="form-field">
                <label class="form-label" for="id_email">Email</label>
                <input type="email" name="email" id="id_email" required
                    class="cc-input" placeholder="you@example.com" autocomplete="email">
            </div>

            <button type="submit" class="btn-primary w-full mt-2">Send Reset Link</button>
        </form>

        <p class="text-center text-sm text-muted mt-6">
            <a href="{% url 'login' %}" class="text-gold hover:underline">Back to login</a>
        </p>
    </div>
</section>
{% endblock %}
