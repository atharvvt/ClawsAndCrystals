{% extends "base.html" %}

{% block title %}Check Your Email{% endblock %}

{% block content %}
<section class="page-section px-6">
    <div class="max-w-md mx-auto glass-card p-8 md:p-10 text-center">
        <span class="section-eyebrow">Email Sent</span>
        <h1 class="section-title mb-4">Check Your Inbox</h1>
        <p class="text-muted text-sm leading-relaxed">
            If an account exists with that email, we've sent password reset instructions.
            Please check your inbox and spam folder.
        </p>
        <a href="{% url 'login' %}" class="btn-primary mt-8 inline-block">Back to Login</a>
    </div>
</section>
{% endblock %}
