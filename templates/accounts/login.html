{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<section class="page-section px-6">
    <div class="max-w-md mx-auto glass-card p-8 md:p-10">
        <div class="section-header mb-8">
            <span class="section-eyebrow">Welcome Back</span>
            <h1 class="section-title">Sign In</h1>
        </div>

        {% if error %}
        <div class="alert alert--error mb-6" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div class="form-field">
                <label class="form-label" for="username">Username</label>
                <input type="text" name="username" id="username" required
                    class="cc-input" placeholder="Your username" autocomplete="username">
            </div>

            <div class="form-field">
                <label class="form-label" for="password">Password</label>
                <input type="password" name="password" id="password" required
                    class="cc-input" placeholder="Your password" autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary w-full mt-2">Login</button>
        </form>

        <p class="text-center text-sm text-muted mt-6">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-gold hover:underline">Register</a>
        </p>
    </div>
</section>

{% endblock %}
