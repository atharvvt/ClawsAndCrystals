{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/design-tokens.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        /* Tailwind reads the same tokens as CSS — change colors in design-tokens.css */
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ivory:       'var(--cc-ivory)',
                        cream:       'var(--cc-cream)',
                        blush:       'var(--cc-blush)',
                        gold:        'var(--cc-accent)',
                        'gold-light':'var(--cc-accent-light)',
                        brown:       'var(--cc-brown)',
                        'brown-mid': 'var(--cc-brown-mid)',
                        muted:       'var(--cc-muted)',
                    },
                    fontFamily: {
                        serif: ['var(--cc-font-serif)'],
                        sans:  ['var(--cc-font-sans)'],
                    },
                    backdropBlur: { xs: '4px' },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{% block title %}Claws & Crystals{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Handcrafted Indian jewellery — Claws & Crystals{% endblock %}">
    {% block extra_meta %}{% endblock %}
</head>
<body class="bg-ivory text-brown font-sans antialiased min-h-screen flex flex-col">

    {% include 'partials/navbar.html' %}
    {% include 'partials/messages.html' %}

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
