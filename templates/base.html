{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ivory:   '#FAF7F2',
                        cream:   '#F3ECE3',
                        blush:   '#E8D5C4',
                        gold:    '#C9A84C',
                        'gold-light': '#E8D499',
                        brown:   '#3D1F0D',
                        'brown-mid': '#6F4E37',
                        muted:   '#9A8070',
                    },
                    fontFamily: {
                        serif:  ['"Cormorant Garamond"', 'Georgia', 'serif'],
                        sans:   ['Inter', 'system-ui', 'sans-serif'],
                    },
                    backdropBlur: {
                        xs: '4px',
                    }
                }
            }
        }
    </script>
    <title>{% block title %}Claws & Crystals{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-ivory text-brown font-sans antialiased">

    {% include 'partials/navbar.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
