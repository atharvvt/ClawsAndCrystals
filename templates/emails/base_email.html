<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_name }}</title>
</head>
<body style="margin:0;padding:0;background:#FAF7F2;font-family:Inter,Helvetica,Arial,sans-serif;color:#3D1F0D;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#FAF7F2;padding:32px 16px;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border:1px solid rgba(201,168,76,0.25);border-radius:12px;overflow:hidden;">
                    <tr>
                        <td style="background:#3D1F0D;padding:24px 32px;text-align:center;">
                            <h1 style="margin:0;font-family:Georgia,serif;font-size:24px;color:#C9A84C;font-weight:600;">
                                {{ site_name }}
                            </h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px;">
                            {% block email_content %}{% endblock %}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 32px;background:#F3ECE3;text-align:center;font-size:12px;color:#9A8070;">
                            &copy; {{ site_name }}. Handcrafted Indian jewellery.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
