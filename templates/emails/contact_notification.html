{% extends "emails/base_email.html" %}

{% block email_content %}
<p style="margin:0 0 16px;font-size:15px;line-height:1.6;">New contact form submission</p>

<table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
    <tr>
        <td style="padding:8px 0;font-size:14px;color:#9A8070;">From</td>
        <td style="padding:8px 0;font-size:14px;text-align:right;">{{ suggestion.name }} &lt;{{ suggestion.email }}&gt;</td>
    </tr>
    <tr>
        <td style="padding:8px 0;font-size:14px;color:#9A8070;">Subject</td>
        <td style="padding:8px 0;font-size:14px;text-align:right;">{{ suggestion.subject }}</td>
    </tr>
</table>

<p style="margin:24px 0 8px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#C9A84C;">Message</p>
<p style="margin:0;font-size:14px;line-height:1.6;white-space:pre-wrap;">{{ suggestion.message }}</p>
{% endblock %}
